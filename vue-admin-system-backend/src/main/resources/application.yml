server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/admin_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
  main:
    allow-circular-references: true

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.admin.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: YourSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong123456
  expiration: 86400000

logging:
  level:
    com.admin: debug
